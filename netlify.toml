[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/video-token"
  to = "/.netlify/functions/video-token"
  status = 200

[[redirects]]
  from = "/api/stream/*/master.m3u8"
  to = "/.netlify/functions/stream-master"
  status = 200

[[redirects]]
  from = "/api/stream/*/segment/*"
  to = "/.netlify/functions/stream-segment"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
